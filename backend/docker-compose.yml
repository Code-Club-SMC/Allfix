version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: allfix
      POSTGRES_USER: allfix
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U allfix"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ENV: development
      PORT: 8080
      DATABASE_URL: postgres://allfix:secret@db:5432/allfix?sslmode=disable
      JWT_SECRET: dev-jwt-secret-change-in-prod
      JWT_EXPIRY_HOURS: 72
      ADMIN_BOOTSTRAP_SECRET: local-dev-bootstrap-secret
    restart: unless-stopped

volumes:
  pgdata:
