services:
  - type: web
    name: allfix-api
    runtime: docker
    plan: free
    rootDir: backend
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: allfix-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY_HOURS
        value: "72"
      - key: ADMIN_BOOTSTRAP_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://allfix-web.onrender.com
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: none

  - type: web
    name: allfix-web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: bun install --frozen-lockfile && bun run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://allfix-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: allfix-db
    plan: free
    postgresMajorVersion: "16"
    databaseName: allfix
    user: allfix
