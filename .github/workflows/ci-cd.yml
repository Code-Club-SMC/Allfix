name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run backend tests
        run: go test ./... -v

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build

  migrate:
    name: Apply production migrations
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Install migrate CLI
        run: go install github.com/golang-migrate/migrate/v4/cmd/migrate@v4.17.1

      - name: Apply database migrations
        run: bash ./backend/scripts/migrate.sh up

  deploy_api:
    name: Trigger API deploy
    runs-on: ubuntu-latest
    needs:
      - migrate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render API deploy hook
        env:
          RENDER_API_DEPLOY_HOOK_URL: ${{ secrets.RENDER_API_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_API_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_API_DEPLOY_HOOK_URL is not set"
            exit 1
          fi

          curl -fsS -X POST "$RENDER_API_DEPLOY_HOOK_URL"

  deploy_web:
    name: Trigger web deploy
    runs-on: ubuntu-latest
    needs:
      - migrate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render web deploy hook
        env:
          RENDER_WEB_DEPLOY_HOOK_URL: ${{ secrets.RENDER_WEB_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_WEB_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_WEB_DEPLOY_HOOK_URL is not set"
            exit 1
          fi

          curl -fsS -X POST "$RENDER_WEB_DEPLOY_HOOK_URL"